<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>My Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">NAM</div>

    <nav>
        <a onclick="show('home')">Home</a>
        <a onclick="show('about')">About</a>
        <a onclick="show('projects')">Projects</a>
        <a onclick="show('contact')">Contact</a>
    </nav>
</header>

<!-- HOME -->
<section id="home" class="page active">
    <h1>TRANG CHỦ</h1>
    <p>Xin chào! Đây là website cá nhân của mình.</p>
</section>

<!-- ABOUT -->
<section id="about" class="page">
    <h1>GIỚI THIỆU</h1>
    <p>Mình thích lập trình web và UI design.</p>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
</section>

<!-- PROJECTS -->
<section id="projects" class="page">
    <h1>DỰ ÁN</h1>

    <ul>
        <li>Website Portfolio</li>
        <li>Mini Game</li>
        <li>Landing Page</li>
    </ul>
</section>

<!-- CONTACT -->
<section id="contact" class="page">
    <h1>LIÊN HỆ</h1>

    <p>Email: nam@gmail.com</p>

    <input placeholder="Tên">
    <input placeholder="Email">
    <textarea placeholder="Nội dung"></textarea>

    <button>Gửi</button>
</section>

<script>
function show(page){

    let pages = document.querySelectorAll('.page');

    pages.forEach(p => p.classList.remove('active'));

    document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
